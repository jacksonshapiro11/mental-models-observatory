name: Morning publish complete

# Event-driven failsafe: when briefs land on main, wait for the live site,
# then POST /api/publish/complete on the custom domain (not *.vercel.app).
# This survives Vercel Cron SSO/redirect failures (Jul 10 2026 incident).
#
# Handles BOTH:
#   - daily: content/daily-updates/YYYY-MM-DD(-light).md → complete?date=
#   - weekly: content/daily-updates/weekly/YYYY-Www*.md → complete?weekly=
#     (W28 2026-07-12: daily-only poll left weekly audio stranded)

on:
  push:
    branches: [main]
    paths:
      - 'content/daily-updates/**'
  workflow_dispatch:
    inputs:
      date:
        description: 'Brief date YYYY-MM-DD (daily path; defaults to today ET)'
        required: false
        type: string
      weekly:
        description: 'Week id YYYY-Www (weekly path; overrides date when set)'
        required: false
        type: string

concurrency:
  group: publish-complete-${{ github.ref }}
  cancel-in-progress: false

jobs:
  complete:
    name: Health poll → publish/complete
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for changed-file detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve target + trigger complete
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SNAPSHOT_SECRET: ${{ secrets.SNAPSHOT_SECRET }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_WEEKLY: ${{ inputs.weekly }}
          SITE_URL: https://www.cosmictrex.com
        run: |
          set -euo pipefail

          SECRET="${CRON_SECRET:-}"
          if [ -z "$SECRET" ]; then
            SECRET="${SNAPSHOT_SECRET:-}"
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::Neither CRON_SECRET nor SNAPSHOT_SECRET is set in repo Actions secrets."
            echo "Add one under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

          WEEKLY=""
          DATE=""

          if [ -n "${INPUT_WEEKLY:-}" ]; then
            WEEKLY="$INPUT_WEEKLY"
          elif [ -n "${INPUT_DATE:-}" ]; then
            DATE="$INPUT_DATE"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Prefer weekly files in this push; else today's daily date.
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/daily-updates/**' 2>/dev/null || true)
            echo "Changed content paths:"
            echo "$CHANGED"
            WEEKLY=$(echo "$CHANGED" | grep -oE 'content/daily-updates/weekly/20[0-9]{2}-W[0-9]{1,2}' | head -1 | grep -oE '20[0-9]{2}-W[0-9]{1,2}' || true)
            if [ -z "$WEEKLY" ]; then
              DATE=$(TZ=America/New_York date +%F)
            fi
          else
            DATE=$(TZ=America/New_York date +%F)
          fi

          if [ -n "$WEEKLY" ]; then
            echo "WEEKLY=$WEEKLY"
            HEALTH_URL="$SITE_URL/api/publish/health?weekly=$WEEKLY"
            COMPLETE_URL="$SITE_URL/api/publish/complete?weekly=$WEEKLY"
            READY_KEY='lightBrief'
            LABEL="weekly $WEEKLY"
          else
            echo "BRIEF_DATE=$DATE"
            HEALTH_URL="$SITE_URL/api/publish/health?date=$DATE"
            COMPLETE_URL="$SITE_URL/api/publish/complete?date=$DATE"
            READY_KEY='lightBrief'
            LABEL="daily $DATE"
          fi

          echo "Polling $HEALTH_URL ..."
          READY=0
          for i in $(seq 1 36); do
            BODY=$(curl -sS "$HEALTH_URL" || true)
            echo "  poll #$i: $BODY"
            echo "$BODY" | grep -q "\"$READY_KEY\":true" && READY=1 && break
            sleep 10
          done

          if [ "$READY" != "1" ]; then
            echo "::error::Deploy health timeout — lightBrief never true for $LABEL"
            exit 1
          fi

          echo "POSTing $COMPLETE_URL ..."
          HTTP=$(curl -sS -o /tmp/complete.json -w "%{http_code}" \
            -X POST "$COMPLETE_URL" \
            -H "Authorization: Bearer $SECRET" \
            -H "User-Agent: mmo-gha-publish-complete")
          echo "HTTP $HTTP"
          cat /tmp/complete.json
          echo

          if [ "$HTTP" = "409" ]; then
            echo "::error::complete skipped (409) for $LABEL"
            exit 1
          fi
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "207" ]; then
            echo "::error::complete failed HTTP $HTTP"
            exit 1
          fi
          echo "publish/complete OK for $LABEL"
